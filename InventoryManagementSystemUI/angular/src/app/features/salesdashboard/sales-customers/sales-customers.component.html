<div class="sales-customers">
  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">My Customers</h4>
    <button class="btn btn-primary" routerLink="/jewelleryManagement/admin/user/add">
      <i class="feather icon-user-plus me-1"></i>Add Customer
    </button>
  </div>

  <!-- Filters -->
  <div class="card mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Search</label>
          <input type="text" class="form-control" placeholder="Search by name, email or phone..."
            [value]="searchTerm" (input)="onSearchChange($event)">
        </div>
        <div class="col-md-3 d-flex align-items-end">
          <button class="btn btn-outline-secondary" (click)="clearFilters()">
            <i class="feather icon-x me-1"></i>Clear Filters
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-2 text-muted">Loading your customers...</p>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && filteredCustomers.length === 0" class="text-center py-5">
    <i class="feather icon-users" style="font-size: 3rem; color: #ccc;"></i>
    <h5 class="mt-3 text-muted">No Customers Found</h5>
    <p class="text-muted">You haven't served any customers yet.</p>
    <button class="btn btn-primary" routerLink="/jewelleryManagement/admin/user/add">
      <i class="feather icon-user-plus me-1"></i>Add Your First Customer
    </button>
  </div>

  <!-- Customers Table -->
  <div *ngIf="!isLoading && filteredCustomers.length > 0" class="card">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Contact</th>
              <th>Address</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let customer of filteredCustomers">
              <td>{{ customer.name }}</td>
              <td>{{ customer.email }}</td>
              <td>{{ customer.contactNumber }}</td>
              <td>{{ customer.address || '-' }}</td>
              <td>
                <button class="btn btn-sm btn-outline-primary me-1" (click)="viewCustomerDetails(customer.id)" title="View Details">
                  <i class="feather icon-eye"></i>
                </button>
                <button class="btn btn-sm btn-outline-success" (click)="createOrderForCustomer(customer.id)" title="Create Order">
                  <i class="feather icon-shopping-bag"></i>
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
